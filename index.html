<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="Student Feedback Registration Form - Submit your feedback for course and faculty evaluation.">
    <title>Student Feedback Registration Form</title>

    <!-- Google Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">

    <!-- External CSS (Sub Task 2) -->
    <link rel="stylesheet" href="styles.css">

    <!-- Internal CSS (Sub Task 2) -->
    <style>
        /* Internal CSS - Additional styling as required by task */
        .form-wrapper .header-section .icon-badge {
            width: 64px;
            height: 64px;
            background: linear-gradient(135deg, #6366f1, #8b5cf6, #a855f7);
            border-radius: 18px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 1.8rem;
            margin: 0 auto 18px;
            box-shadow: 0 8px 24px rgba(99, 102, 241, 0.4);
            animation: float 3s ease-in-out infinite;
        }

        @keyframes float {
            0%, 100% { transform: translateY(0); }
            50% { transform: translateY(-6px); }
        }

        .section-divider {
            border: none;
            height: 1px;
            background: linear-gradient(90deg, transparent, rgba(255, 255, 255, 0.2), transparent);
            margin: 30px 0;
        }

        .form-group label .required-star {
            color: #f87171;
            margin-left: 3px;
            font-weight: 700;
        }

        .char-counter {
            font-size: 0.72rem;
            color: rgba(255, 255, 255, 0.4);
            text-align: right;
            margin-top: 4px;
        }

        .footer-note {
            text-align: center;
            margin-top: 28px;
            font-size: 0.78rem;
            color: rgba(255, 255, 255, 0.35);
        }

        .footer-note a {
            color: #a78bfa;
            text-decoration: none;
        }

        .footer-note a:hover {
            text-decoration: underline;
        }
    </style>
</head>
<body>

    <!-- Background Particles -->
    <div class="bg-particles">
        <div class="particle particle-1"></div>
        <div class="particle particle-2"></div>
        <div class="particle particle-3"></div>
        <div class="particle particle-4"></div>
    </div>

    <div class="form-wrapper">
        <!-- Header Section -->
        <div class="header-section">
            <div class="icon-badge">📝</div>
            <h1>Student Feedback</h1>
            <p class="subtitle">Registration Form</p>
        </div>

        <hr class="section-divider">

        <!-- Registration Form -->
        <form id="feedbackForm" novalidate>

            <!-- 1. Student Name -->
            <div class="form-group">
                <label for="studentName">Student Name <span class="required-star">*</span></label>
                <input type="text" id="studentName" name="studentName" placeholder="Enter your full name" autocomplete="name">
                <span class="error-message" id="studentNameError"></span>
            </div>

            <!-- 2. Email ID -->
            <div class="form-group">
                <label for="emailId">Email ID <span class="required-star">*</span></label>
                <input type="email" id="emailId" name="emailId" placeholder="yourname@example.com" autocomplete="email">
                <span class="error-message" id="emailIdError"></span>
            </div>

            <!-- 3. Mobile Number -->
            <div class="form-group">
                <label for="mobileNumber">Mobile Number <span class="required-star">*</span></label>
                <input type="tel" id="mobileNumber" name="mobileNumber" placeholder="Enter 10-digit mobile number" autocomplete="tel" maxlength="10">
                <span class="error-message" id="mobileNumberError"></span>
            </div>

            <hr class="section-divider">

            <!-- 4. Department (Dropdown) -->
            <div class="form-group">
                <label for="department">Department <span class="required-star">*</span></label>
                <select id="department" name="department">
                    <option value="">-- Select Department --</option>
                    <option value="Computer Science">Computer Science</option>
                    <option value="Information Technology">Information Technology</option>
                    <option value="Electronics">Electronics &amp; Telecommunication</option>
                    <option value="Mechanical">Mechanical Engineering</option>
                    <option value="Civil">Civil Engineering</option>
                    <option value="Data Science">Data Science</option>
                    <option value="AI & ML">AI &amp; Machine Learning</option>
                    <option value="MBA">MBA</option>
                </select>
                <span class="error-message" id="departmentError"></span>
            </div>

            <!-- 5. Gender (Radio Buttons) -->
            <div class="form-group" id="genderGroup">
                <label>Gender <span class="required-star">*</span></label>
                <div class="radio-group">
                    <label class="radio-label">
                        <input type="radio" name="gender" value="Male" id="genderMale">
                        <span class="radio-custom"></span>
                        Male
                    </label>
                    <label class="radio-label">
                        <input type="radio" name="gender" value="Female" id="genderFemale">
                        <span class="radio-custom"></span>
                        Female
                    </label>
                    <label class="radio-label">
                        <input type="radio" name="gender" value="Other" id="genderOther">
                        <span class="radio-custom"></span>
                        Other
                    </label>
                </div>
                <span class="error-message" id="genderError"></span>
            </div>

            <hr class="section-divider">

            <!-- 6. Feedback Comments -->
            <div class="form-group">
                <label for="feedbackComments">Feedback Comments <span class="required-star">*</span></label>
                <textarea id="feedbackComments" name="feedbackComments" rows="5" placeholder="Share your detailed feedback (minimum 10 words)..."></textarea>
                <span class="char-counter" id="wordCounter">0 words</span>
                <span class="error-message" id="feedbackCommentsError"></span>
            </div>

            <!-- Buttons: Submit & Reset -->
            <div class="button-group">
                <button type="submit" class="btn btn-submit" id="submitBtn">
                    <span class="btn-text">Submit Feedback</span>
                    <span class="btn-icon">→</span>
                </button>
                <button type="reset" class="btn btn-reset" id="resetBtn">
                    <span class="btn-text">Reset Form</span>
                    <span class="btn-icon">↺</span>
                </button>
            </div>
        </form>

        <p class="footer-note">
            Your feedback helps us improve. Thank you! 🙏
        </p>
    </div>

    <!-- Success Overlay -->
    <div class="success-overlay" id="successOverlay">
        <div class="success-box">
            <div class="success-checkmark">✅</div>
            <h2>Feedback Submitted!</h2>
            <p>Thank you for your valuable feedback.</p>
            <button class="btn-close-success" id="closeSuccessBtn">Close</button>
        </div>
    </div>

    <!-- External JavaScript (Sub Task 3) -->
    <script src="script.js"></script>
</body>
</html>
